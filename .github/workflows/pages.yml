# Publishes the landing page (index.html) + article/ + src/ to GitHub Pages (source: GitHub Actions).
# Site layout: /  -> index.html (home),  /article/ -> the essay,  /src/ -> the source PDFs.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "article/**"
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Switch the Pages source to "GitHub Actions" if it isn't already.
          enablement: true

      - name: Assemble site (landing page + article + papers)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r article _site/article
          cp -r src _site/src
          touch _site/.nojekyll

      - name: Upload site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
